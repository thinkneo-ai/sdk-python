name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/ -v --timeout=30 -m "not live"
      - name: Live E2E tests (master only)
        if: github.ref == 'refs/heads/master'
        run: pytest tests/ -v --timeout=60 -m live || true
